apis:
  - aid: focus-spec:focus-spec
    name: FOCUS (FinOps Open Cost and Usage Specification)
    description: >-
      FOCUS defines a common normalized data schema for cloud and
      technology billing data. The specification is delivered as a set of
      normative documents and supporting artifacts (column library,
      requirements model, validator, Excel/CSV samples) rather than as a
      REST API. This entry tracks the specification itself and links to
      a JSON Schema representation of a single FOCUS-conformant billing
      record so that data consumers and integrators can validate
      individual rows produced by FOCUS-aligned exports.
