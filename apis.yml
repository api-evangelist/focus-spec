aid: focus-spec
name: FOCUS (FinOps Open Cost and Usage Specification)
description: >-
  FOCUS, the FinOps Open Cost and Usage Specification, is an open standard
  maintained under the FinOps Foundation that normalizes cost and usage
  data across cloud, SaaS, data center, and other technology vendors.
  FOCUS defines a common data schema, a controlled vocabulary of column
  names, allowed values, and pricing attributes so that practitioners can
  apply a consistent set of FinOps practices regardless of which provider
  generated the underlying billing dataset. FOCUS is purely a data
  specification rather than a REST API; conforming providers expose
  exports of their billing data in the FOCUS format, and tooling consumes
  those exports against the published column library, data model, and
  validator.
